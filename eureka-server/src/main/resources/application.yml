server:
  port: 8761

spring:
  application:
    name: eureka-server
  security:
    user:
      # Credentials MUST be supplied via EUREKA_USER and EUREKA_PASSWORD environment variables.
      # No fallback defaults — startup will fail if these are not set.
      name: ${EUREKA_USER}
      password: ${EUREKA_PASSWORD}

eureka:
  instance:
    hostname: ${EUREKA_HOSTNAME:localhost}
  client:
    # This instance is the server; it should not register itself or fetch the registry
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${EUREKA_USER}:${EUREKA_PASSWORD}@${EUREKA_HOSTNAME:localhost}:${server.port}/eureka/
  server:
    enable-self-preservation: false
    eviction-interval-timer-in-ms: 5000
    wait-time-in-ms-when-sync-empty: 0
    renewal-percent-threshold: 0.49

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    com.netflix.eureka: INFO
    com.netflix.discovery: INFO
  file:
    name: logs/eureka-server.log
