server.port=8089
spring.profiles.active=dev
spring.application.name=settlement-service

# OWASP Security Configurations
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# Spring Security
app.security.user.name=${APP_SECURITY_USER_NAME:}
app.security.user.password-hash=${APP_SECURITY_USER_PASSWORD_HASH:}
app.security.user.roles=${APP_SECURITY_USER_ROLES:USER}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Database (MySQL) — credentials via environment variables
spring.datasource.url=${DB_URL:jdbc:mysql://172.17.0.4:3306/settlementdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:riverplate}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.das=INFO
logging.file.name=logs/settlement-service.log

# Session Management
server.servlet.session.timeout=15m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict

# JWT Configuration
jwt.secret=${JWT_SECRET:dev-secret-key-for-local-development-only-32chars}
jwt.expiration=3600000

# Eureka Service Discovery
eureka.client.service-url.defaultZone=${EUREKA_URL:http://eureka:eureka@localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30

# MedicalSalesRep service (used by IMedicalSalesRepPort to validate existence and active status)
msr.service.base-url=${MSR_SERVICE_BASE_URL:http://localhost:8085}
