# ── Dev profile: H2 in-memory DB so no MySQL required ──────────────────────

# Override MySQL datasource with H2
spring.datasource.url=jdbc:h2:mem:msrdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# Default JWT secret for local dev — must match application module's dev secret
jwt.secret=${JWT_SECRET:dev-secret-key-for-local-development-only-32chars}

# Disable Eureka registration in standalone dev mode
eureka.client.enabled=false
